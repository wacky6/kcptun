name: Build and Release

on:
  push:
    branches:
      - fork
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: fork

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Install zip
        run: |
          sudo apt-get update
          sudo apt-get install -y zip

      - name: Run build-release.sh
        run: |
          chmod +x ./build-release.sh
          ./build-release.sh

      - name: Encrypt build output
        env:
          ZIP_PASSWORD: ${{ secrets.ZIP_PASSWORD }}
        run: |
          mkdir -p build_encrypted
          cd build
          for dir in */; do
            if [ -d "$dir" ]; then
              dir_name="${dir%/}"
              (cd "$dir" && zip -P "$ZIP_PASSWORD" "../../build_encrypted/${dir_name}_key0.zip" *)
            fi
          done

      - name: Get current date
        id: date
        run: echo "date=$(date -u +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.date.outputs.date }}
          name: Release ${{ steps.date.outputs.date }}
          files: build_encrypted/*
